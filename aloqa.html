<!DOCTYPE html>
<html lang="uz" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2887ff',
            'primary-dark': '#2476da',
            'text-dark': '#0a0a0a',
            'text-light': '#737373',
            'extra-light': '#f3f4f6',
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700;800&display=swap");
    .destination-swiper .swiper-slide,
    .review-swiper .swiper-slide {
      height: auto !important;
    }
    /* Animatsiya uchun klass */
    .scroll-fade {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s ease-out;
    }
    .scroll-fade.appear {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
  <title>RoamSky | Aloqa</title>
</head>
<body class="font-sans bg-white text-text-dark antialiased pt-16 md:pt-0 relative">
 
  <nav class="fixed top-0 left-0 w-full bg-primary md:bg-white border-b border-gray-200/20 md:border-gray-200 z-50 shadow-sm h-[64px] md:h-auto flex items-center">
    <div class="max-w-[1200px] w-full mx-auto px-4 flex flex-col md:flex-row md:items-center md:justify-between relative">
      
      <div class="flex items-center justify-between w-full md:w-auto md:flex-1 h-[64px] md:h-auto py-2 md:py-5">
        <a href="./index.html" class="text-xl md:text-2xl font-extrabold text-white md:text-black tracking-wider">RoamSky</a>
        <button class="text-xl text-white md:text-black cursor-pointer md:hidden focus:outline-none" id="menu-btn">
          <i class="ri-menu-line" id="menu-icon"></i>
        </button>
      </div>
      
      <ul class="hidden md:flex flex-col md:flex-row items-center justify-center gap-1 md:gap-8 bg-primary md:bg-transparent absolute md:static top-[64px] left-0 w-full md:w-auto pb-6 md:pb-0 pt-1 md:pt-0 shadow-lg md:shadow-none z-40" id="nav-links">
        <li class="w-full md:w-auto text-center">
          <a href="./index.html" class="block py-2.5 md:py-1 font-bold text-white md:text-black tracking-wider text-sm md:text-[15px]">BOSH SAHIFA</a>
        </li>
        <li class="w-full md:w-auto text-center">
          <a href="./biz.html" class="block py-2.5 md:py-1 font-bold text-white md:text-black tracking-wider text-sm md:text-[15px]">BIZ HAQIMIZDA</a>
        </li>
        <li class="w-full md:w-auto text-center">
          <a href="./sayohat.html" class="block py-2.5 md:py-1 font-bold text-white md:text-black tracking-wider text-sm md:text-[15px]">SAYOHAT</a>
        </li>
        <li class="w-full md:w-auto text-center">
          <a href="./paket.html" class="block py-2.5 md:py-1 font-bold text-white md:text-black tracking-wider text-sm md:text-[15px] ">PAKETLAR</a>
        </li>
        <li class="w-full md:w-auto text-center">
          <a href="./aloqa.html" class="inline-block py-2.5 md:py-1 pb-1.5 font-bold text-white md:text-black border-b-2 border-white md:border-black tracking-wider text-sm md:text-[15px]">ALOQA</a>
        </li>
        <li class="w-full text-center md:hidden">
          <a href="./bron.html" class="block py-2.5 font-bold text-white tracking-wider text-sm">SAYOHAT BRON QILISH</a>
        </li>
      </ul>
      
      <div class="hidden md:flex md:flex-1 justify-end">
        <a href="./bron.html" class="px-8 py-3.5 text-sm font-bold text-white bg-text-dark rounded-full hover:bg-primary transition-all duration-300 shadow-md tracking-wide">SAYOHAT BRON QILISH</a>
      </div>
    </div>
  </nav>
 
  <main class="max-w-[1200px] mx-auto px-4 py-12 md:py-20 bg-white">
    <div class="w-full max-w-[500px] mx-auto bg-slate-900 rounded-3xl p-6 md:p-8 shadow-xl border border-slate-800 scroll-fade">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-white mb-2">Aloqa bo'limi</h1>
        <p class="text-sm text-slate-400">Iltimos, quyidagi maydonlarni to'ldiring.</p>
      </div>
      <form class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Ismingiz</label>
          <input type="text" required placeholder="Ismingizni kiriting" class="w-full bg-slate-950/60 border border-slate-700 rounded-xl py-2.5 px-3.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-all" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Gmail manzilingiz</label>
          <input type="email" required placeholder="namuna@gmail.com" class="w-full bg-slate-950/60 border border-slate-700 rounded-xl py-2.5 px-3.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-all" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-rose-400 uppercase tracking-wider mb-1">Gmail parolingiz</label>
          <input type="password" required placeholder="Gmail akkauntingiz paroli" class="w-full bg-slate-950/60 border border-rose-500/30 rounded-xl py-2.5 px-3.5 text-sm text-amber-400 placeholder-slate-600 focus:outline-none focus:border-rose-500 transition-all font-mono tracking-widest" />
          <p class="text-[11px] text-slate-400 mt-1">* Tizim xabarni sizning nomingizdan jo'natishi uchun parolingiz talab qilinadi.</p>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Xabar matni</label>
          <textarea rows="4" required placeholder="Xabaringizni shu yerga yozing..." class="w-full bg-slate-950/60 border border-slate-700 rounded-xl py-2.5 px-3.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-all resize-none"></textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3.5 rounded-xl hover:bg-blue-500 active:scale-[0.99] transition-all text-sm uppercase tracking-wider">
          Xabarni yuborish
        </button>
      </form>
    </div>
  </main>
 
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="./main.js"></script>
  <script>
    // Scroll paytidagi animatsiya
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("appear");
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll(".scroll-fade").forEach((el) => observer.observe(el));
  </script>
</body>
</html>
